AWSTemplateFormatVersion: "2010-09-09"
Description: Static site infrastructure for Mower Man QLD.

Parameters:
  ProjectName:
    Type: String
    Default: mower-man-qld
  OriginBucketName:
    Type: String
    Default: ""
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
  PrimaryDomainName:
    Type: String
    Default: ""
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for CloudFront. CloudFront certificates must be issued in us-east-1.

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref OriginBucketName, ""]]
  HasCustomDomain: !And
    - !Not [!Equals [!Ref PrimaryDomainName, ""]]
    - !Not [!Equals [!Ref AcmCertificateArn, ""]]

Resources:
  OriginBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref OriginBucketName, !Ref "AWS::NoValue"]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        Description: !Sub "Origin access control for ${ProjectName}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CleanUrlsFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${ProjectName}-clean-urls"
      AutoPublish: true
      FunctionConfig:
        Comment: Append index.html for clean static URLs.
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var uri = request.uri;
            if (uri.endsWith('/')) {
                request.uri += 'index.html';
            } else if (!uri.includes('.')) {
                request.uri += '/index.html';
            }
            return request;
        }

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${ProjectName}-security-headers"
        Comment: Security headers for Mower Man QLD.
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: SAMEORIGIN
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: camera=(), geolocation=(), microphone=()
              Override: true

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName} static website distribution"
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref PriceClass
        Aliases: !If [HasCustomDomain, [!Ref PrimaryDomainName], !Ref "AWS::NoValue"]
        Origins:
          - Id: s3-origin
            DomainName: !GetAtt OriginBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt CleanUrlsFunction.FunctionMetadata.FunctionARN
          ResponseHeadersPolicyId: !GetAtt SecurityHeadersPolicy.Id
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            MinimumProtocolVersion: TLSv1.2_2021
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true

  OriginBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OriginBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadObjects
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${OriginBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"
          - Sid: AllowCloudFrontListBucket
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:ListBucket
            Resource: !GetAtt OriginBucket.Arn
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  OriginBucketName:
    Value: !Ref OriginBucket
  CloudFrontDistributionId:
    Value: !Ref Distribution
  CloudFrontDomainName:
    Value: !GetAtt Distribution.DomainName
  SiteUrl:
    Value: !If
      - HasCustomDomain
      - !Sub "https://${PrimaryDomainName}"
      - !Sub "https://${Distribution.DomainName}"
