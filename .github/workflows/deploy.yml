name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}
  STACK_NAME: mower-man-qld-site
  PROJECT_NAME: mower-man-qld
  PRIMARY_DOMAIN_NAME: ${{ vars.PRIMARY_DOMAIN_NAME || 'mowermanqld.com.au' }}
  ACM_CERTIFICATE_ARN: ${{ vars.ACM_CERTIFICATE_ARN || '' }}
  ORIGIN_BUCKET_NAME: ${{ vars.ORIGIN_BUCKET_NAME || '' }}
  ANCHOR_FORMS_API_BASE: ${{ vars.ANCHOR_FORMS_API_BASE || 'https://jp5by1qc4d.execute-api.ap-southeast-2.amazonaws.com' }}
  CLOUDFRONT_ZONE_ID: Z2FDTNDATAQYW2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Test site
        run: npm test

      - name: Inject forms endpoint
        run: |
          sed -i "s#__ANCHOR_FORMS_API_BASE__#${ANCHOR_FORMS_API_BASE}#g" scripts.js

      - name: Ensure CloudFront certificate
        if: env.PRIMARY_DOMAIN_NAME != '' && env.ACM_CERTIFICATE_ARN == ''
        run: |
          DOMAIN="$PRIMARY_DOMAIN_NAME"
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${DOMAIN}." \
            --query "HostedZones[?Name=='${DOMAIN}.'].Id | [0]" \
            --output text | sed 's#/hostedzone/##')

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "None" ]; then
            echo "No Route53 hosted zone found for ${DOMAIN}."
            exit 1
          fi

          CERT_ARN=$(aws acm list-certificates \
            --region us-east-1 \
            --certificate-statuses ISSUED PENDING_VALIDATION \
            --query "CertificateSummaryList[?DomainName=='${DOMAIN}'].CertificateArn | [0]" \
            --output text)

          if [ -z "$CERT_ARN" ] || [ "$CERT_ARN" = "None" ]; then
            CERT_ARN=$(aws acm request-certificate \
              --region us-east-1 \
              --domain-name "$DOMAIN" \
              --validation-method DNS \
              --idempotency-token mowermanqld \
              --query "CertificateArn" \
              --output text)
          fi

          for i in {1..12}; do
            aws acm describe-certificate \
              --region us-east-1 \
              --certificate-arn "$CERT_ARN" \
              --query "Certificate.DomainValidationOptions[?ResourceRecord.Name!=null].ResourceRecord" \
              --output json > validation-records.json
            RECORD_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('validation-records.json','utf8')).length)")
            if [ "$RECORD_COUNT" -gt 0 ]; then
              break
            fi
            sleep 10
          done

          node <<'NODE'
          const fs = require("fs");
          const records = JSON.parse(fs.readFileSync("validation-records.json", "utf8"));
          fs.writeFileSync("validation-change-batch.json", JSON.stringify({
            Changes: records.map((record) => ({
              Action: "UPSERT",
              ResourceRecordSet: {
                Name: record.Name,
                Type: record.Type,
                TTL: 300,
                ResourceRecords: [{ Value: record.Value }]
              }
            }))
          }, null, 2));
          NODE

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch file://validation-change-batch.json

          aws acm wait certificate-validated \
            --region us-east-1 \
            --certificate-arn "$CERT_ARN"

          echo "ACM_CERTIFICATE_ARN=$CERT_ARN" >> "$GITHUB_ENV"

      - name: Deploy infrastructure
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file infra/cloudfront-site.yml \
            --region "$AWS_REGION" \
            --parameter-overrides \
              ProjectName="$PROJECT_NAME" \
              OriginBucketName="$ORIGIN_BUCKET_NAME" \
              PrimaryDomainName="$PRIMARY_DOMAIN_NAME" \
              AcmCertificateArn="$ACM_CERTIFICATE_ARN"

      - name: Read stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks --region "$AWS_REGION" --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='OriginBucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --region "$AWS_REGION" --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          URL=$(aws cloudformation describe-stacks --region "$AWS_REGION" --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='SiteUrl'].OutputValue" --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution=$DIST" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Sync files to S3
        run: |
          aws s3 sync ./ "s3://${{ steps.stack.outputs.bucket }}" --delete --exact-timestamps \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "scripts/*" \
            --exclude "infra/*" \
            --exclude ".DS_Store" \
            --exclude "*/.DS_Store" \
            --exclude ".gitignore" \
            --exclude "package*.json" \
            --exclude "README.md"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ steps.stack.outputs.distribution }}" --paths "/*"

      - name: Point domain at CloudFront
        if: env.PRIMARY_DOMAIN_NAME != ''
        run: |
          export DOMAIN="$PRIMARY_DOMAIN_NAME"
          export CLOUDFRONT_DOMAIN="${{ steps.stack.outputs.url }}"
          export CLOUDFRONT_DOMAIN="${CLOUDFRONT_DOMAIN#https://}"
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${DOMAIN}." \
            --query "HostedZones[?Name=='${DOMAIN}.'].Id | [0]" \
            --output text | sed 's#/hostedzone/##')

          node <<'NODE'
          const fs = require("fs");
          const domain = process.env.DOMAIN;
          const target = process.env.CLOUDFRONT_DOMAIN;
          const cloudFrontZoneId = process.env.CLOUDFRONT_ZONE_ID;
          fs.writeFileSync("alias-change-batch.json", JSON.stringify({
            Changes: ["A", "AAAA"].map((type) => ({
              Action: "UPSERT",
              ResourceRecordSet: {
                Name: `${domain}.`,
                Type: type,
                AliasTarget: {
                  HostedZoneId: cloudFrontZoneId,
                  DNSName: target,
                  EvaluateTargetHealth: false
                }
              }
            }))
          }, null, 2));
          NODE

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch file://alias-change-batch.json

      - name: Deployment summary
        run: |
          echo "Deployed to ${{ steps.stack.outputs.url }}"
